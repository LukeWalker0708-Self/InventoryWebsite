<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bedding Inventory Workflow MVP</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
    <script src="script.js" defer></script>
    <script src="fit-table.js" defer></script>
  </head>
  <body>
    <div id="auth-root" class="auth-shell">
      <div class="auth-card">
        <h1>Bedding Admin MVP</h1>
        <p>Local role-based login for internal workflow demo.</p>
        <label>
          User Name
          <input id="login-name" type="text" placeholder="e.g. Alice" />
        </label>
        <label>
          Role
          <select id="login-role"></select>
        </label>
        <button id="login-btn" type="button">Enter System</button>
      </div>
    </div>

    <div id="app-root" class="app-shell hidden">
      <header class="app-header">
        <div>
          <h1>Inventory / Order Workflow</h1>
          <p>Local-first MVP (sync disabled for now)</p>
        </div>
        <div class="header-actions">
          <span id="current-user" class="user-pill"></span>
          <button id="logout-btn" type="button">Log out</button>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <h2>Modules</h2>
          <nav id="module-nav" class="module-nav"></nav>
        </aside>

        <section class="content">
          <div id="module-panels"></div>
        </section>

        <aside id="lineage-panel" class="lineage-panel">
          <h3>Row Lineage</h3>
          <div id="lineage-content">Select a row to view relationship references.</div>
        </aside>
      </main>
    </div>

    <div id="edit-root" class="edit-shell hidden">
      <div class="edit-card">
        <div class="edit-head">
          <div>
            <h2 id="edit-title">Edit Row</h2>
            <p id="edit-subtitle"></p>
          </div>
          <button id="edit-back-btn" type="button">← Back</button>
        </div>
        <form id="edit-form" class="edit-form"></form>
        <div class="edit-actions">
          <button id="edit-save-btn" type="button">Save</button>
        </div>
      </div>
    </div>
  </body>
</html>
